<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elite Interior Business Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
  transition: 0.3s;
}

body.dark {
  background: #111;
  color: white;
}

header {
  background: #000;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

.container {
  padding: 20px;
}

/* LOGIN */
.login-box {
  width: 300px;
  margin: 80px auto;
  padding: 20px;
  background: white;
  border-radius: 10px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
}

.card {
  width: 250px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card h3 {
  margin: 10px;
}

.price {
  color: green;
  margin: 10px;
  font-weight: bold;
}

/* ADMIN */
.admin {
  display: none;
  background: #fff;
  padding: 15px;
  border-radius: 10px;
}

/* BUTTONS */
button {
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

/* DARK */
.dark .card, .dark .login-box, .dark .admin {
  background: #222;
  color: white;
}
</style>

</head>

<body>

<header>
  <div><b>Elite Interior Pro</b></div>
  <nav>
    <a href="#" onclick="show('home')">Home</a>
    <a href="#" onclick="show('admin')">Admin</a>
    <a href="#" onclick="toggleDark()">Dark</a>
    <a href="#" onclick="logout()">Logout</a>
  </nav>
</header>

<!-- LOGIN -->
<div id="login" class="login-box">
  <h3>Login</h3>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="home" class="container" style="display:none;">

  <h2>Interior Designs (House + Office)</h2>

  <input placeholder="Search designs..." onkeyup="search(this.value)">

  <div class="grid" id="grid"></div>

</div>

<!-- ADMIN -->
<div id="admin" class="container admin">

  <h2>Admin Panel - Add Design</h2>

  <input id="title" placeholder="Title">
  <input id="img" placeholder="Image URL">
  <input id="type" placeholder="house / office">
  <input id="price" placeholder="Price">

  <button onclick="addDesign()">Add Design</button>

</div>

<script>

let designs = JSON.parse(localStorage.getItem("designs")) || [

  // HOUSE
  {t:"Luxury Living Room",img:"https://images.unsplash.com/photo-1502005229762-cf1b2da7c5d6",type:"house",p:1200},
  {t:"Modern Bedroom",img:"https://images.unsplash.com/photo-1507089947368-19c1da9775ae",type:"house",p:1500},
  {t:"Minimal Kitchen",img:"https://images.unsplash.com/photo-1524758631624-e2822e304c36",type:"house",p:900},
  {t:"Elegant Hall",img:"https://images.unsplash.com/photo-1505691938895-1758d7feb511",type:"house",p:1100},
  {t:"Dining Space",img:"https://images.unsplash.com/photo-1484154218962-a197022b5858",type:"house",p:800},
  {t:"Luxury Lounge",img:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85",type:"house",p:1300},

  // OFFICE
  {t:"Corporate Office",img:"https://images.unsplash.com/photo-1521737604893-d14cc237f11d",type:"office",p:2000},
  {t:"Startup Office",img:"https://images.unsplash.com/photo-1497366754035-f200968a6e72",type:"office",p:1800},
  {t:"Meeting Room",img:"https://images.unsplash.com/photo-1556761175-4b46a572b786",type:"office",p:1400},
  {t:"Executive Cabin",img:"https://images.unsplash.com/photo-1520607162513-77705c0f0d4a",type:"office",p:2200},
  {t:"Work Desk Area",img:"https://images.unsplash.com/photo-1521737604893-d14cc237f11d",type:"office",p:1000},
  {t:"Creative Studio",img:"https://images.unsplash.com/photo-1524758631624-e2822e304c36",type:"office",p:1700}

];

let loggedIn = false;

function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "admin" && p === "1234"){
    loggedIn = true;
    document.getElementById("login").style.display="none";
    document.getElementById("home").style.display="block";
    render();
  } else {
    alert("Wrong login (admin / 1234)");
  }
}

function logout(){
  location.reload();
}

function show(page){
  document.getElementById("home").style.display="none";
  document.getElementById("admin").style.display="none";

  if(page==="home") document.getElementById("home").style.display="block";
  if(page==="admin") document.getElementById("admin").style.display="block";
}

function render(list=designs){
  let g = document.getElementById("grid");
  g.innerHTML="";

  list.forEach(d=>{
    g.innerHTML += `
      <div class="card">
        <img src="${d.img}">
        <h3>${d.t}</h3>
        <div class="price">$${d.p}</div>
        <small style="margin:10px;display:block">${d.type}</small>
      </div>
    `;
  });
}

function search(q){
  let f = designs.filter(d=>d.t.toLowerCase().includes(q.toLowerCase()));
  render(f);
}

function addDesign(){
  let t = document.getElementById("title").value;
  let img = document.getElementById("img").value;
  let type = document.getElementById("type").value;
  let price = document.getElementById("price").value;

  designs.push({t,img,type,p:price});
  localStorage.setItem("designs", JSON.stringify(designs));

  alert("Design added!");
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

// init
render();

</script>

</body>
</html>
