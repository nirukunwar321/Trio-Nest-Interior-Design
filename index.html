<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interior Design Studio Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  color: #333;
}

/* HEADER */
header {
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
}

/* NAV */
nav {
  display: flex;
  justify-content: center;
  background: #222;
  flex-wrap: wrap;
}

nav a {
  color: white;
  padding: 12px 18px;
  text-decoration: none;
}

nav a:hover {
  background: #444;
}

/* HERO */
.hero {
  height: 420px;
  background: url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85') center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 42px;
  font-weight: bold;
  text-shadow: 2px 2px 12px black;
}

/* SECTION */
.section {
  padding: 50px 20px;
  text-align: center;
}

.section h2 {
  margin-bottom: 30px;
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  max-width: 1100px;
  margin: auto;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card h3 {
  margin: 10px 0;
}

.price {
  color: green;
  font-weight: bold;
  margin-bottom: 10px;
}

/* FILTER BUTTONS */
.filters {
  margin-bottom: 20px;
}

.filters button {
  padding: 10px 15px;
  border: none;
  cursor: pointer;
  margin: 5px;
  background: #222;
  color: white;
  border-radius: 5px;
}

.filters button:hover {
  background: #555;
}

/* FORM */
form {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button.submit {
  background: green;
  color: white;
  padding: 10px;
  border: none;
  cursor: pointer;
}

/* FOOTER */
footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <h1>Interior Design Studio Pro</h1>
</header>

<nav>
  <a href="#home">Home</a>
  <a href="#gallery">Gallery</a>
  <a href="#pricing">Pricing</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<div class="hero" id="home">
  Modern Interior Designs
</div>

<!-- GALLERY -->
<div class="section" id="gallery">
  <h2>Our Projects</h2>

  <div class="filters">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('house')">House</button>
    <button onclick="filter('office')">Office</button>
    <button onclick="filter('hotel')">Hotel</button>
  </div>

  <div class="grid">

    <div class="card item house">
      <img src="https://images.unsplash.com/photo-1502005229762-cf1b2da7c5d6">
      <h3>Luxury Living Room</h3>
      <div class="price">$5000</div>
    </div>

    <div class="card item house">
      <img src="https://images.unsplash.com/photo-1505693314120-0d443867891c">
      <h3>Modern Bedroom</h3>
      <div class="price">$3500</div>
    </div>

    <div class="card item office">
      <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d">
      <h3>Startup Office</h3>
      <div class="price">$6000</div>
    </div>

    <div class="card item office">
      <img src="https://images.unsplash.com/photo-1524758631624-e2822e304c36">
      <h3>Corporate Office</h3>
      <div class="price">$8000</div>
    </div>

    <div class="card item hotel">
      <img src="https://images.unsplash.com/photo-1445019980597-93fa8acb246c">
      <h3>Hotel Lobby</h3>
      <div class="price">$15000</div>
    </div>

    <div class="card item hotel">
      <img src="https://images.unsplash.com/photo-1501117716987-c8e1ecb2102a">
      <h3>Hotel Room</h3>
      <div class="price">$10000</div>
    </div>

  </div>
</div>

<!-- PRICING CALCULATOR -->
<div class="section" id="pricing">
  <h2>Price Calculator</h2>

  <form onsubmit="calcPrice(event)">
    <label>Room Type</label>
    <select id="type">
      <option value="house">House</option>
      <option value="office">Office</option>
      <option value="hotel">Hotel</option>
    </select>

    <label>Area (sq ft)</label>
    <input type="number" id="area" placeholder="Enter area">

    <button class="submit" type="submit">Calculate</button>

    <h3 id="result"></h3>
  </form>
</div>

<!-- CONTACT -->
<div class="section" id="contact">
  <h2>Contact Us</h2>

  <form>
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Email">
    <textarea rows="5" placeholder="Message"></textarea>
    <button class="submit" type="submit">Send</button>
  </form>
</div>

<footer>
  <p>© 2026 Interior Design Studio Pro</p>
</footer>

<script>
// FILTER FUNCTION
function filter(category) {
  let items = document.querySelectorAll('.item');
  items.forEach(item => {
    if (category === 'all') {
      item.style.display = 'block';
    } else {
      item.style.display = item.classList.contains(category) ? 'block' : 'none';
    }
  });
}

// PRICE CALCULATOR
function calcPrice(e) {
  e.preventDefault();

  let type = document.getElementById('type').value;
  let area = document.getElementById('area').value;

  let rate = 0;

  if (type === 'house') rate = 50;
  if (type === 'office') rate = 70;
  if (type === 'hotel') rate = 120;

  let total = area * rate;

  document.getElementById('result').innerText =
    "Estimated Price: $" + total;
}
</script>

</body>
</html>
